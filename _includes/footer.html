<footer class="site-footer">
  <div class="container site-footer__grid">
    <div>
      <p class="footer-brand">De Creatieve M(a)an</p>
      <p class="footer-tagline">Zet mensen in beweging.</p>
    </div>
    <nav aria-label="Footer navigatie">
      <ul class="footer-links">
        {% for item in site.footer_links %}
        <li><a href="{{ item.url | relative_url }}">{{ item.title }}</a></li>
        {% endfor %}
      </ul>
    </nav>
    <div class="footer-contact">
      <p><a href="mailto:{{ site.email }}">{{ site.email }}</a></p>
      <p><a href="tel:{{ site.phone_link }}">{{ site.phone }}</a></p>
    </div>
  </div>
  <div class="container site-footer__bottom">
    <p>&copy; {{ 'now' | date: '%Y' }} Jan-Willem Manenschijn</p>
  </div>
</footer>
