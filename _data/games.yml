- title: Serious game sessie
  emoji: "🎲"
  type: Op locatie of online
  description: >-
    Samen spelen we een serious game die past bij jouw vraagstuk — van
    bewustwording tot teamontwikkeling. Ik begeleid het spel en de reflectie
    zodat de ervaring landt in jullie praktijk.
- title: Escape room experience
  emoji: "🔐"
  type: Fysiek of digitaal
  description: >-
    Energieke escape rooms en online varianten die teams verbinden en
    uitdagingen bespreekbaar maken. Ideaal voor teambuilding, onboarding of
    strategiecommunicatie.
- title: Concept & spelontwerp
  emoji: "✏️"
  type: Maatwerk
  description: >-
    Heb je een thema of leerdoel? Dan denk ik graag mee over de spelvorm —
    bordspel, kaartspel of digitale game — en begeleid ik het traject van idee
    tot speelbare ervaring.
- title: Training & facilitatie
  emoji: "🚀"
  type: Workshops
  description: >-
    Trainingen waarin leren en spelen samenkomen. Met een mensgerichte aanpak
    zorg ik dat deelnemers niet alleen nadenken, maar ook echt in beweging komen.
