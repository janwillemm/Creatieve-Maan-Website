- title: Preludens
  emoji: "✨"
  type: Leerervaringen · eigen leeromgeving
  audience: Organisaties met veranderings- of opleidingsvraagstukken
  description: >-
    Via Preludens ontwerp ik leerervaringen die mensen voorbereiden op wat komen
    gaat: stripverhalen voor inleving, MicroGames voor activatie en herhaling, en
    directe feedback in jullie eigen leeromgeving.
  highlights:
    - MicroGame Stories — volledige storylines (ca. 7 hoofdstukken, 5 MicroGames)
    - Short Stories — korte dilemma-interventies (2–5 keuzes per verhaal)
    - Van visie tot inzetbaar product, aansluitend bij jullie praktijk
  link: /preludens/
  link_label: Ontdek Preludens
  internal: true
  order: 0

- title: Een eigen thuis
  emoji: "🏠"
  type: Fysiek bordspel · bewustwording
  audience: Teams, scholen en maatschappelijke organisaties
  description: >-
    Een ervaringsgericht bordspel dat de problematiek rond dak- en thuisloosheid
    bespreekbaar maakt. Spelers stappen in een situatie die de realiteit nabootst
    en ervaren hoe het is om te navigeren door opvang en regelingen — met ruimte
    voor reflectie achteraf.
  highlights:
    - Fysiek spel in een kartonnen koker (spelmat, kaarten en materialen)
    - Geschikt om te faciliteren met begeleider en reflectievragen
    - Ontwikkeld bij Raccoon Serious Games; ik begeleid het spel nog steeds
  link: https://raccoon.games/iedereen-een-thuis-serious-game/
  link_label: Video & handleiding (Raccoon)
  order: 1

- title: Laaggeletterdheid — workshop
  emoji: "📖"
  type: Workshop · bewustwording
  audience: Gemeenten, bibliotheken, zorg en onderwijs — tot 50 deelnemers
  description: >-
    Een energieke workshop waarin deelnemers ervaren hoe het is om vast te lopen
    in taal — iets waar dagelijks 2,5 miljoen Nederlanders mee te maken hebben.
    Gebaseerd op de bekroonde Great Holiday Escape (caravan) en de handzame
    escape koffer: in circa 15 minuten per ronde voel je de frustratie, daarna
    praten we over begrip en handelen.
  highlights:
    - Workshop op maat voor groepen tot 50 personen (parallelle spelrondes)
    - Ontstaan uit de Raccoon-caravan (NRC: “parel van bewustwording”) en de koffer met Stichting Lezen en Schrijven
    - Ik was mede-ontwikkelaar en begeleid het programma — van voorbereiding tot nagesprek
    - Geschikt voor Week van Lezen en Schrijven, teamdagen en bewustwordingscampagnes
  links:
    - url: https://raccoon.games/escapebox-stichting-lezen-schrijven/
      label: Escape koffer (Raccoon)
    - url: https://raccoon.games/laaggeletterdheid-escape-caravan-great-holiday-escape/
      label: Escape caravan (Raccoon)
  order: 2

- title: Woordenweide
  emoji: "🌿"
  type: Digitale app · kleuteronderwijs
  audience: Kleuterleerkrachten, IB schools en ouders
  description: >-
    Met Woordenweide leren kleuters op een speelse manier Nederlandse woorden.
    De app combineert spraak en beeld met minigames, zodat kinderen hun
    woordenschat vergroten — thuis én op school.
  highlights:
    - Themawoorden voor het hele schooljaar plannen
    - Ontwikkeld door leerkrachten, voor in de kleuterklas
    - Stimuleert samenwerking tussen ouder en kind
  link: https://woordenweide.nl
  link_label: Meer op woordenweide.nl
  contact: woordenweide@creatievemaan.nl
  order: 3
